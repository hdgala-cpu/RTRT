<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  h1 {
    font-size: 15vw;
    font-weight: 900;
    letter-spacing: 0.05em;
    animation: flash 0.5s steps(1) infinite;
  }
  @keyframes flash {
    0%   { color: #ff0000; }
    50%  { color: #ffff00; }
    100% { color: #ff0000; }
  }
</style>
</head>
<body>
  <h1>HELLO WORLD</h1>
</body>
</html>
