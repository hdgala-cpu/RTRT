<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Globe</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #cfd8e3;
  }
  #c { display: block; width: 100%; height: 100%; }

  #panels {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 340px;
    max-height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
    pointer-events: none;
  }
  .panel {
    pointer-events: auto;
    background: rgba(8, 14, 24, 0.55);
    border: 1px solid rgba(120, 200, 255, 0.18);
    border-radius: 10px;
    padding: 12px 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 0 24px rgba(80, 160, 255, 0.06) inset, 0 4px 18px rgba(0,0,0,0.4);
  }

  .clock-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    line-height: 1.2;
  }
  .clock-row + .clock-row { margin-top: 6px; }
  .label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6fa8d6;
  }
  .time {
    font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
    font-size: 22px;
    font-weight: 600;
    color: #e6f1ff;
    text-shadow: 0 0 8px rgba(110, 180, 255, 0.35);
    font-variant-numeric: tabular-nums;
  }

  .sat-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .sat-count {
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 26px;
    font-weight: 700;
    color: #7be0a6;
    text-shadow: 0 0 10px rgba(120, 240, 170, 0.35);
    font-variant-numeric: tabular-nums;
  }
  .china-count {
    color: #ffb37a !important;
    text-shadow: 0 0 10px rgba(255, 170, 100, 0.35) !important;
  }
  .sat-sub {
    margin-top: 6px;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6fa8d6;
  }
  .sat-select {
    margin-top: 8px;
    width: 100%;
    background: rgba(0, 0, 0, 0.5);
    color: #e6f1ff;
    border: 1px solid rgba(120, 200, 255, 0.25);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 12px;
    outline: none;
  }
  .sat-select:focus { border-color: rgba(120, 200, 255, 0.6); }
  .sat-status {
    margin-top: 6px;
    font-size: 10.5px;
    color: #7a8fa8;
    font-style: italic;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panels">
  <div class="panel" id="clock-panel">
    <div class="clock-row">
      <span class="label">UTC</span>
      <span class="time" id="utc-time">--:--:--</span>
    </div>
    <div class="clock-row">
      <span class="label">IST</span>
      <span class="time" id="ist-time">--:--:--</span>
    </div>
  </div>
  <div class="panel" id="sat-panel">
    <div class="sat-head">
      <span class="label">Sats over subcontinent</span>
      <span class="sat-count" id="sat-count">…</span>
    </div>
    <div class="sat-sub">From New Delhi · az / el</div>
    <select class="sat-select" id="sat-list" size="1">
      <option>Loading TLE data…</option>
    </select>
    <div class="sat-status" id="sat-status">Fetching from CelesTrak</div>
  </div>
  <div class="panel" id="china-panel">
    <div class="sat-head">
      <span class="label">Chinese satellites</span>
      <span class="sat-count china-count" id="china-count">…</span>
    </div>
    <div class="sat-sub">Name · purpose · alt · launch · sub-sat point</div>
    <select class="sat-select" id="china-list" size="1">
      <option>Loading SATCAT…</option>
    </select>
    <div class="sat-status" id="china-status">Fetching CelesTrak SATCAT</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ---------- Globe ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.5;
controls.zoomSpeed = 0.8;
controls.minDistance = 1.2;
controls.maxDistance = 8;
controls.enablePan = false;

const loader = new THREE.TextureLoader();
const earthTex = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
earthTex.colorSpace = THREE.SRGBColorSpace;
const bumpTex = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
const specTex = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.MeshPhongMaterial({ map: earthTex, normalMap: bumpTex, specularMap: specTex, shininess: 12 })
);
scene.add(earth);

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(5, 3, 5);
scene.add(sun);

(() => {
  const g = new THREE.BufferGeometry();
  const n = 2000;
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const r = 80 + Math.random() * 20;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, sizeAttenuation: false })));
})();

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

function animate() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

/* ---------- Clock ---------- */
const utcEl = document.getElementById('utc-time');
const istEl = document.getElementById('ist-time');
function fmtTime(d, tz) {
  return d.toLocaleTimeString('en-GB', { hour12: false, timeZone: tz });
}
function tickClock() {
  const now = new Date();
  utcEl.textContent = fmtTime(now, 'UTC');
  istEl.textContent = fmtTime(now, 'Asia/Kolkata');
}
tickClock();
setInterval(tickClock, 1000);

/* ---------- Satellites ---------- */
const DELHI = { name: 'New Delhi', lat: 28.6139, lon: 77.2090, alt: 0.216 };
const SUBCONTINENT = [
  DELHI,
  { name: 'Mumbai',    lat: 19.0760, lon: 72.8777, alt: 0.014 },
  { name: 'Kolkata',   lat: 22.5726, lon: 88.3639, alt: 0.009 },
  { name: 'Chennai',   lat: 13.0827, lon: 80.2707, alt: 0.007 },
  { name: 'Bangalore', lat: 12.9716, lon: 77.5946, alt: 0.920 },
  { name: 'Karachi',   lat: 24.8607, lon: 67.0011, alt: 0.008 },
  { name: 'Dhaka',     lat: 23.8103, lon: 90.4125, alt: 0.004 },
  { name: 'Colombo',   lat:  6.9271, lon: 79.8612, alt: 0.001 },
  { name: 'Kathmandu', lat: 27.7172, lon: 85.3240, alt: 1.400 },
];

function toObserverGd(c) {
  return {
    longitude: satellite.degreesToRadians(c.lon),
    latitude:  satellite.degreesToRadians(c.lat),
    height:    c.alt,
  };
}
const observers = SUBCONTINENT.map(toObserverGd);
const delhiObs = toObserverGd(DELHI);

const countEl = document.getElementById('sat-count');
const listEl = document.getElementById('sat-list');
const statusEl = document.getElementById('sat-status');
const chinaCountEl = document.getElementById('china-count');
const chinaListEl = document.getElementById('china-list');
const chinaStatusEl = document.getElementById('china-status');

let sats = [];
let chineseMeta = new Map();
let satcatReady = false;

function parseTLE(text) {
  const lines = text.replace(/\r/g, '').split('\n').map(l => l.trim()).filter(Boolean);
  const out = [];
  for (let i = 0; i + 2 < lines.length; i += 3) {
    const name = lines[i];
    const l1 = lines[i+1];
    const l2 = lines[i+2];
    if (!l1.startsWith('1 ') || !l2.startsWith('2 ')) continue;
    try {
      const rec = satellite.twoline2satrec(l1, l2);
      if (!rec.error) out.push({ name, rec });
    } catch (e) { /* skip bad TLE */ }
  }
  return out;
}

async function loadTLE() {
  statusEl.textContent = 'Fetching from CelesTrak…';
  const url = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    sats = parseTLE(text);
    if (sats.length === 0) throw new Error('No TLEs parsed');
    statusEl.textContent = `${sats.length} active satellites loaded`;
    updateSats();
    if (satcatReady) updateChinese();
  } catch (e) {
    statusEl.textContent = 'TLE fetch failed: ' + e.message;
    countEl.textContent = '—';
    listEl.innerHTML = '<option>Unable to load satellite data</option>';
  }
}

function purposeOf(name) {
  const u = name.toUpperCase();
  if (/\bBEIDOU\b|\bCOMPASS\b/.test(u)) return 'Navigation (BeiDou)';
  if (/\bFENGYUN\b|\bFY-/.test(u)) return 'Meteorology';
  if (/\bGAOFEN\b|\bGF-/.test(u)) return 'High-res Earth obs';
  if (/\bYAOGAN\b/.test(u)) return 'Remote sensing';
  if (/\bZIYUAN\b|\bZY-/.test(u)) return 'Earth resources';
  if (/\bHAIYANG\b|\bHY-/.test(u)) return 'Ocean observation';
  if (/\bHUANJING\b|\bHJ-/.test(u)) return 'Environment / disaster';
  if (/\bTIANHUI\b|\bTH-/.test(u)) return 'Geodesy / mapping';
  if (/\bSHIJIAN\b|\bSJ-/.test(u)) return 'Tech demo / experiment';
  if (/\bTIANLIAN\b|\bTL-/.test(u)) return 'Data relay';
  if (/\bZHONGXING\b|\bCHINASAT\b|\bZX-/.test(u)) return 'Communications';
  if (/\bAPSTAR\b/.test(u)) return 'Commercial comms';
  if (/\bASIASAT\b/.test(u)) return 'Commercial comms';
  if (/\bTIANGONG\b|\bTG-/.test(u)) return 'Crewed space station';
  if (/\bSHENZHOU\b|\bSZ-/.test(u)) return 'Crewed spacecraft';
  if (/\bTIANZHOU\b|\bTZ-/.test(u)) return 'Cargo spacecraft';
  if (/CHANG.?E/.test(u)) return 'Lunar exploration';
  if (/\bTIANWEN\b|\bTW-/.test(u)) return 'Interplanetary';
  if (/\bMOZI\b|\bQUESS\b/.test(u)) return 'Quantum comms';
  if (/\bHXMT\b/.test(u)) return 'X-ray astronomy';
  if (/\bDAMPE\b/.test(u)) return 'Dark matter';
  if (/\bCSES\b/.test(u)) return 'Seismic monitoring';
  if (/\bXPNAV\b/.test(u)) return 'Pulsar nav test';
  if (/\bTJS\b|\bTJSW\b/.test(u)) return 'Comms tech experiment';
  if (/\bJILIN\b/.test(u)) return 'Commercial Earth obs';
  if (/\bBEIJING\b/.test(u)) return 'Earth observation';
  if (/\bXJS\b|\bXJY\b/.test(u)) return 'Tech experiment';
  if (/\bSHIYAN\b|\bSY-/.test(u)) return 'Experimental';
  if (/\bCAS-|\bXW-/.test(u)) return 'Amateur radio';
  if (/\bDFH\b/.test(u)) return 'Comms / test';
  if (/\bKZ-|\bKUAIZHOU\b/.test(u)) return 'Launch test';
  if (/\bLUDI\b|\bLT-/.test(u)) return 'Earth observation';
  if (/\bLINGQIAO\b|LING QIAO/.test(u)) return 'Comms test';
  if (/\bQIANFAN\b/.test(u)) return 'Broadband constellation';
  if (/\bGUOWANG\b/.test(u)) return 'Broadband constellation';
  return 'Unspecified';
}

function parseCSVLine(line) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}

async function loadSATCAT() {
  chinaStatusEl.textContent = 'Fetching CelesTrak SATCAT…';
  try {
    const res = await fetch('https://celestrak.org/pub/satcat.csv');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const lines = text.split('\n');
    const header = parseCSVLine(lines[0]);
    const idx = {
      name:    header.indexOf('OBJECT_NAME'),
      norad:   header.indexOf('NORAD_CAT_ID'),
      type:    header.indexOf('OBJECT_TYPE'),
      owner:   header.indexOf('OWNER'),
      launch:  header.indexOf('LAUNCH_DATE'),
      apogee:  header.indexOf('APOGEE'),
      perigee: header.indexOf('PERIGEE'),
      ops:     header.indexOf('OPS_STATUS_CODE'),
    };
    let count = 0;
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i]) continue;
      const f = parseCSVLine(lines[i]);
      if (f[idx.owner] !== 'PRC') continue;
      if (f[idx.type] !== 'PAYLOAD') continue;
      const apo = parseFloat(f[idx.apogee]);
      const per = parseFloat(f[idx.perigee]);
      const avgAlt = (isFinite(apo) && isFinite(per)) ? Math.round((apo + per) / 2) : null;
      const name = f[idx.name];
      chineseMeta.set(String(parseInt(f[idx.norad], 10)), {
        name,
        purpose: purposeOf(name),
        launch: f[idx.launch],
        avgAlt,
      });
      count++;
    }
    satcatReady = true;
    chinaStatusEl.textContent = `${count} PRC payloads in catalog`;
    if (sats.length > 0) updateChinese();
  } catch (e) {
    chinaStatusEl.textContent = 'SATCAT fetch failed: ' + e.message;
    chinaCountEl.textContent = '—';
    chinaListEl.innerHTML = '<option>Unable to load SATCAT</option>';
  }
}

function fmtLat(d) {
  return Math.abs(d).toFixed(0) + (d >= 0 ? 'N' : 'S');
}
function fmtLon(d) {
  return Math.abs(d).toFixed(0) + (d >= 0 ? 'E' : 'W');
}
function fmtLaunch(s) {
  if (!s) return '----';
  const m = String(s).match(/^(\d{4})/);
  return m ? m[1] : '----';
}

function updateChinese() {
  if (!satcatReady || sats.length === 0) return;
  const now = new Date();
  const gmst = satellite.gstime(now);
  const out = [];
  for (const s of sats) {
    const meta = chineseMeta.get(String(parseInt(s.rec.satnum, 10)));
    if (!meta) continue;
    const pv = satellite.propagate(s.rec, now);
    if (!pv.position) continue;
    const geo = satellite.eciToGeodetic(pv.position, gmst);
    const lat = satellite.degreesLat(geo.latitude);
    const lon = satellite.degreesLong(geo.longitude);
    out.push({
      name: meta.name,
      purpose: meta.purpose,
      avgAlt: meta.avgAlt,
      launch: fmtLaunch(meta.launch),
      lat, lon,
      instAlt: Math.round(geo.height),
    });
  }
  out.sort((a, b) => a.name.localeCompare(b.name));
  chinaCountEl.textContent = out.length.toLocaleString();
  const opts = out.map(s => {
    const alt = s.avgAlt != null ? `${s.avgAlt} km` : `~${s.instAlt} km`;
    return `<option>${escapeHtml(s.name)} · ${s.purpose} · ${alt} · ${s.launch} · ${fmtLat(s.lat)} ${fmtLon(s.lon)}</option>`;
  }).join('');
  chinaListEl.innerHTML = opts || '<option>No tracked Chinese payloads</option>';
  chinaStatusEl.textContent = `${out.length} active · purpose inferred from family name`;
}

function updateSats() {
  if (sats.length === 0) return;
  const now = new Date();
  const gmst = satellite.gstime(now);

  let countSubcontinent = 0;
  const visibleFromDelhi = [];

  for (const s of sats) {
    const pv = satellite.propagate(s.rec, now);
    if (!pv.position) continue;
    const ecf = satellite.eciToEcf(pv.position, gmst);

    let seen = false;
    for (const obs of observers) {
      const la = satellite.ecfToLookAngles(obs, ecf);
      if (la.elevation > 0) { seen = true; break; }
    }
    if (!seen) continue;
    countSubcontinent++;

    const laDelhi = satellite.ecfToLookAngles(delhiObs, ecf);
    if (laDelhi.elevation > 0) {
      visibleFromDelhi.push({
        name: s.name,
        az: satellite.radiansToDegrees(laDelhi.azimuth),
        el: satellite.radiansToDegrees(laDelhi.elevation),
      });
    }
  }

  countEl.textContent = countSubcontinent.toLocaleString();

  visibleFromDelhi.sort((a, b) => b.el - a.el);
  const top = visibleFromDelhi.slice(0, 100);
  const opts = top.map(s =>
    `<option>${escapeHtml(s.name).padEnd(24)} az ${s.az.toFixed(1).padStart(5)}°  el ${s.el.toFixed(1).padStart(4)}°</option>`
  ).join('');
  listEl.innerHTML = opts || '<option>No satellites above horizon</option>';
  statusEl.textContent = `${visibleFromDelhi.length} above Delhi · showing top ${Math.min(100, visibleFromDelhi.length)}`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadTLE();
loadSATCAT();
setInterval(() => {
  updateSats();
  updateChinese();
}, 5000);
</script>
</body>
</html>
