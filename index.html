{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ---------- Globe ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.5;
controls.zoomSpeed = 0.8;
controls.minDistance = 1.2;
controls.maxDistance = 8;
controls.enablePan = false;

const loader = new THREE.TextureLoader();
const earthTex = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
earthTex.colorSpace = THREE.SRGBColorSpace;
const bumpTex = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
const specTex = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.MeshPhongMaterial({ map: earthTex, normalMap: bumpTex, specularMap: specTex, shininess: 12 })
);
scene.add(earth);

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(5, 3, 5);
scene.add(sun);

(() => {
  const g = new THREE.BufferGeometry();
  const n = 2000;
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const r = 80 + Math.random() * 20;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, sizeAttenuation: false })));
})();

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

function animate() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

/* ---------- Clock ---------- */
const utcEl = document.getElementById('utc-time');
const istEl = document.getElementById('ist-time');
function fmtTime(d, tz) {
  return d.toLocaleTimeString('en-GB', { hour12: false, timeZone: tz });
}
function tickClock() {
  const now = new Date();
  utcEl.textContent = fmtTime(now, 'UTC');
  istEl.textContent = fmtTime(now, 'Asia/Kolkata');
}
tickClock();
setInterval(tickClock, 1000);

/* ---------- Satellites ---------- */
const DELHI = { name: 'New Delhi', lat: 28.6139, lon: 77.2090, alt: 0.216 };
const SUBCONTINENT = [
  DELHI,
  { name: 'Mumbai',    lat: 19.0760, lon: 72.8777, alt: 0.014 },
  { name: 'Kolkata',   lat: 22.5726, lon: 88.3639, alt: 0.009 },
  { name: 'Chennai',   lat: 13.0827, lon: 80.2707, alt: 0.007 },
  { name: 'Bangalore', lat: 12.9716, lon: 77.5946, alt: 0.920 },
  { name: 'Karachi',   lat: 24.8607, lon: 67.0011, alt: 0.008 },
  { name: 'Dhaka',     lat: 23.8103, lon: 90.4125, alt: 0.004 },
  { name: 'Colombo',   lat:  6.9271, lon: 79.8612, alt: 0.001 },
  { name: 'Kathmandu', lat: 27.7172, lon: 85.3240, alt: 1.400 },
];

function toObserverGd(c) {
  return {
    longitude: satellite.degreesToRadians(c.lon),
    latitude:  satellite.degreesToRadians(c.lat),
    height:    c.alt,
  };
}
const observers = SUBCONTINENT.map(toObserverGd);
const delhiObs = toObserverGd(DELHI);

const countEl = document.getElementById('sat-count');
const listEl = document.getElementById('sat-list');
const statusEl = document.getElementById('sat-status');
const chinaCountEl = document.getElementById('china-count');
const chinaListEl = document.getElementById('china-list');
const chinaStatusEl = document.getElementById('china-status');

let sats = [];
let chineseMeta = new Map();
let satcatReady = false;

function parseTLE(text) {
  const lines = text.replace(/\r/g, '').split('\n').map(l => l.trim()).filter(Boolean);
  const out = [];
  for (let i = 0; i + 2 < lines.length; i += 3) {
    const name = lines[i];
    const l1 = lines[i+1];
    const l2 = lines[i+2];
    if (!l1.startsWith('1 ') || !l2.startsWith('2 ')) continue;
    try {
      const rec = satellite.twoline2satrec(l1, l2);
      if (!rec.error) out.push({ name, rec, tle1: l1, tle2: l2 });
    } catch (e) { /* skip bad TLE */ }
  }
  return out;
}

async function loadTLE() {
  statusEl.textContent = 'Fetching from CelesTrak…';
  const url = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    sats = parseTLE(text);
    if (sats.length === 0) throw new Error('No TLEs parsed');
    statusEl.textContent = `${sats.length} active satellites loaded`;
    updateSats();
    if (satcatReady) {
      updateChinese();
      buildChineseAll();
    }
  } catch (e) {
    statusEl.textContent = 'TLE fetch failed: ' + e.message;
    countEl.textContent = '—';
    listEl.innerHTML = '<option>Unable to load satellite data</option>';
  }
}

function categoryOf(purpose) {
  if (/^Navigation/.test(purpose)) return 'Navigation';
  if (/Earth obs|Remote sensing|Earth resources|Ocean|Environment|Geodesy|Earth observation|mapping/i.test(purpose)) return 'EarthObservation';
  if (/Communications|Comms|Data relay|Broadband/.test(purpose)) return 'Communications';
  if (purpose === 'Meteorology') return 'Meteorology';
  return 'Science';
}

const KNOWN_DIMS = [
  [/TIANHE/i,             '~16.6 m × 4.2 m, ~22.5 t — CSS core module'],
  [/WENTIAN/i,            '~17.9 m × 4.2 m, ~23 t — CSS lab module'],
  [/MENGTIAN/i,           '~17.9 m × 4.2 m, ~23 t — CSS lab module'],
  [/TIANGONG/i,           '~16.6 × 39 × 27.4 m, ~100 t — assembled station'],
  [/SHENZHOU/i,           '9.25 m long × 2.9 m dia, ~7.8 t — crewed spacecraft'],
  [/TIANZHOU/i,           '10.6 m long × 3.35 m dia, ~13 t — cargo spacecraft'],
  [/CHANG.?E/i,           'Lander + rover; varies by mission (~3.7 t lander class)'],
  [/TIANWEN/i,            '~3.4 × 4.2 × 5.0 m orbiter + lander/rover, ~5 t total'],
  [/MOZI|QUESS/i,         '~1.7 × 1.7 m bus, ~600 kg — quantum experiment'],
  [/HXMT|INSIGHT/i,       '~2.8 × 2.8 m, ~2.5 t — X-ray telescope'],
  [/DAMPE|WUKONG/i,       '~1.5 × 1.5 × 1.2 m, ~1.9 t — particle detector'],
  [/CSES|ZHANGHENG/i,     '~1.4 × 1.4 × 1.4 m, ~730 kg — seismic monitor'],
  [/BEIDOU.*MEO|BEIDOU-3/i,'Bus ~2.25 × 1.0 × 1.22 m, solar span ~25 m, ~1060 kg'],
  [/BEIDOU/i,             'Comm bus, ~800–4500 kg depending on slot (GEO/IGSO/MEO)'],
  [/FENGYUN.*4|FY-4/i,    '~2.4 × 2.4 × 4.6 m, ~5.4 t — geostationary weather sat'],
  [/FENGYUN.*3|FY-3/i,    '~4.4 × 2.0 × 2.0 m, ~2.45 t — polar weather sat'],
  [/GAOFEN.*1|GF-1/i,     '~3.0 × 1.7 × 1.5 m, ~1080 kg'],
  [/GAOFEN.*2|GF-2/i,     '~5.2 × 2.2 × 2.0 m, ~2.1 t'],
  [/ZHONGXING|CHINASAT/i, 'DFH-3/4/5 bus, ~2.0–7.6 t depending on bus'],
];

function dimensionsOf(name, rcs) {
  for (const [re, dim] of KNOWN_DIMS) if (re.test(name)) return dim;
  const r = (rcs || '').trim();
  if (!r) return 'Not publicly available';
  if (/^[A-Z]+$/.test(r)) return `Bus class: ${r.toLowerCase()} (NORAD RCS class)`;
  const n = parseFloat(r);
  if (isFinite(n)) return `RCS ${n.toFixed(2)} m² (radar cross section, size proxy)`;
  return 'Not publicly available';
}

function purposeOf(name) {
  const u = name.toUpperCase();
  if (/\bBEIDOU\b|\bCOMPASS\b/.test(u)) return 'Navigation (BeiDou)';
  if (/\bFENGYUN\b|\bFY-/.test(u)) return 'Meteorology';
  if (/\bGAOFEN\b|\bGF-/.test(u)) return 'High-res Earth obs';
  if (/\bYAOGAN\b/.test(u)) return 'Remote sensing';
  if (/\bZIYUAN\b|\bZY-/.test(u)) return 'Earth resources';
  if (/\bHAIYANG\b|\bHY-/.test(u)) return 'Ocean observation';
  if (/\bHUANJING\b|\bHJ-/.test(u)) return 'Environment / disaster';
  if (/\bTIANHUI\b|\bTH-/.test(u)) return 'Geodesy / mapping';
  if (/\bSHIJIAN\b|\bSJ-/.test(u)) return 'Tech demo / experiment';
  if (/\bTIANLIAN\b|\bTL-/.test(u)) return 'Data relay';
  if (/\bZHONGXING\b|\bCHINASAT\b|\bZX-/.test(u)) return 'Communications';
  if (/\bAPSTAR\b/.test(u)) return 'Commercial comms';
  if (/\bASIASAT\b/.test(u)) return 'Commercial comms';
  if (/\bTIANGONG\b|\bTG-/.test(u)) return 'Crewed space station';
  if (/\bSHENZHOU\b|\bSZ-/.test(u)) return 'Crewed spacecraft';
  if (/\bTIANZHOU\b|\bTZ-/.test(u)) return 'Cargo spacecraft';
  if (/CHANG.?E/.test(u)) return 'Lunar exploration';
  if (/\bTIANWEN\b|\bTW-/.test(u)) return 'Interplanetary';
  if (/\bMOZI\b|\bQUESS\b/.test(u)) return 'Quantum comms';
  if (/\bHXMT\b/.test(u)) return 'X-ray astronomy';
  if (/\bDAMPE\b/.test(u)) return 'Dark matter';
  if (/\bCSES\b/.test(u)) return 'Seismic monitoring';
  if (/\bXPNAV\b/.test(u)) return 'Pulsar nav test';
  if (/\bTJS\b|\bTJSW\b/.test(u)) return 'Comms tech experiment';
  if (/\bJILIN\b/.test(u)) return 'Commercial Earth obs';
  if (/\bBEIJING\b/.test(u)) return 'Earth observation';
  if (/\bXJS\b|\bXJY\b/.test(u)) return 'Tech experiment';
  if (/\bSHIYAN\b|\bSY-/.test(u)) return 'Experimental';
  if (/\bCAS-|\bXW-/.test(u)) return 'Amateur radio';
  if (/\bDFH\b/.test(u)) return 'Comms / test';
  if (/\bKZ-|\bKUAIZHOU\b/.test(u)) return 'Launch test';
  if (/\bLUDI\b|\bLT-/.test(u)) return 'Earth observation';
  if (/\bLINGQIAO\b|LING QIAO/.test(u)) return 'Comms test';
  if (/\bQIANFAN\b/.test(u)) return 'Broadband constellation';
  if (/\bGUOWANG\b/.test(u)) return 'Broadband constellation';
  return 'Unspecified';
}

function parseCSVLine(line) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}

async function loadSATCAT() {
  chinaStatusEl.textContent = 'Fetching CelesTrak SATCAT…';
  try {
    const res = await fetch('https://celestrak.org/pub/satcat.csv');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const lines = text.split('\n');
    const header = parseCSVLine(lines[0]);
    const idx = {
      name:    header.indexOf('OBJECT_NAME'),
      intl:    header.indexOf('OBJECT_ID'),
      norad:   header.indexOf('NORAD_CAT_ID'),
      type:    header.indexOf('OBJECT_TYPE'),
      owner:   header.indexOf('OWNER'),
      launch:  header.indexOf('LAUNCH_DATE'),
      apogee:  header.indexOf('APOGEE'),
      perigee: header.indexOf('PERIGEE'),
      rcs:     header.indexOf('RCS'),
      ops:     header.indexOf('OPS_STATUS_CODE'),
    };
    let count = 0;
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i]) continue;
      const f = parseCSVLine(lines[i]);
      if (f[idx.owner] !== 'PRC') continue;
      if (f[idx.type] !== 'PAYLOAD') continue;
      const apo = parseFloat(f[idx.apogee]);
      const per = parseFloat(f[idx.perigee]);
      const avgAlt = (isFinite(apo) && isFinite(per)) ? Math.round((apo + per) / 2) : null;
      const name = f[idx.name];
      const purpose = purposeOf(name);
      chineseMeta.set(String(parseInt(f[idx.norad], 10)), {
        name,
        intlDes: f[idx.intl],
        purpose,
        category: categoryOf(purpose),
        launch: f[idx.launch],
        apogee: isFinite(apo) ? apo : null,
        perigee: isFinite(per) ? per : null,
        avgAlt,
        rcs: f[idx.rcs],
        ops: f[idx.ops],
      });
      count++;
    }
    satcatReady = true;
    chinaStatusEl.textContent = `${count} PRC payloads in catalog`;
    if (sats.length > 0) {
      updateChinese();
      buildChineseAll();
    } else {
      buildChineseAll();
    }
  } catch (e) {
    chinaStatusEl.textContent = 'SATCAT fetch failed: ' + e.message;
    chinaCountEl.textContent = '—';
    chinaListEl.innerHTML = '<option>Unable to load SATCAT</option>';
  }
}

function fmtLat(d) {
  return Math.abs(d).toFixed(0) + (d >= 0 ? 'N' : 'S');
}
function fmtLon(d) {
  return Math.abs(d).toFixed(0) + (d >= 0 ? 'E' : 'W');
}
function fmtLaunch(s) {
  if (!s) return '----';
  const m = String(s).match(/^(\d{4})/);
  return m ? m[1] : '----';
}

function updateChinese() {
  if (!satcatReady || sats.length === 0) return;
  const now = new Date();
  const gmst = satellite.gstime(now);
  const out = [];
  for (const s of sats) {
    const meta = chineseMeta.get(String(parseInt(s.rec.satnum, 10)));
    if (!meta) continue;
    const pv = satellite.propagate(s.rec, now);
    if (!pv.position) continue;
    const geo = satellite.eciToGeodetic(pv.position, gmst);
    const lat = satellite.degreesLat(geo.latitude);
    const lon = satellite.degreesLong(geo.longitude);
    out.push({
      name: meta.name,
      purpose: meta.purpose,
      avgAlt: meta.avgAlt,
      launch: fmtLaunch(meta.launch),
      lat, lon,
      instAlt: Math.round(geo.height),
    });
  }
  out.sort((a, b) => a.name.localeCompare(b.name));
  chinaCountEl.textContent = out.length.toLocaleString();
  const opts = out.map(s => {
    const alt = s.avgAlt != null ? `${s.avgAlt} km` : `~${s.instAlt} km`;
    return `<option>${escapeHtml(s.name)} · ${s.purpose} · ${alt} · ${s.launch} · ${fmtLat(s.lat)} ${fmtLon(s.lon)}</option>`;
  }).join('');
  chinaListEl.innerHTML = opts || '<option>No tracked Chinese payloads</option>';
  chinaStatusEl.textContent = `${out.length} active · purpose inferred from family name`;
}

function updateSats() {
  if (sats.length === 0) return;
  const now = new Date();
  const gmst = satellite.gstime(now);

  let countSubcontinent = 0;
  const visibleFromDelhi = [];

  for (const s of sats) {
    const pv = satellite.propagate(s.rec, now);
    if (!pv.position) continue;
    const ecf = satellite.eciToEcf(pv.position, gmst);

    let seen = false;
    for (const obs of observers) {
      const la = satellite.ecfToLookAngles(obs, ecf);
      if (la.elevation > 0) { seen = true; break; }
    }
    if (!seen) continue;
    countSubcontinent++;

    const laDelhi = satellite.ecfToLookAngles(delhiObs, ecf);
    if (laDelhi.elevation > 0) {
      visibleFromDelhi.push({
        name: s.name,
        az: satellite.radiansToDegrees(laDelhi.azimuth),
        el: satellite.radiansToDegrees(laDelhi.elevation),
      });
    }
  }

  countEl.textContent = countSubcontinent.toLocaleString();

  visibleFromDelhi.sort((a, b) => b.el - a.el);
  const top = visibleFromDelhi.slice(0, 100);
  const opts = top.map(s =>
    `<option>${escapeHtml(s.name).padEnd(24)} az ${s.az.toFixed(1).padStart(5)}°  el ${s.el.toFixed(1).padStart(4)}°</option>`
  ).join('');
  listEl.innerHTML = opts || '<option>No satellites above horizon</option>';
  statusEl.textContent = `${visibleFromDelhi.length} above Delhi · showing top ${Math.min(100, visibleFromDelhi.length)}`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadTLE();
loadSATCAT();
setInterval(() => {
  updateSats();
  updateChinese();
}, 5000);

/* ---------- Catalog (left panel + modal) ---------- */
const catCountEl   = document.getElementById('cat-count');
const groupSelect  = document.getElementById('group-select');
const catListEl    = document.getElementById('cat-list');
const catStatusEl  = document.getElementById('cat-status');
const modalEl      = document.getElementById('modal');
const modalTitle   = document.getElementById('modal-title');
const modalBody    = document.getElementById('modal-body');
const modalCloseEl = document.getElementById('modal-close');

let chineseAll = [];

function buildChineseAll() {
  if (!satcatReady) return;
  const byNorad = new Map();
  for (const s of sats) byNorad.set(String(parseInt(s.rec.satnum, 10)), s);
  chineseAll = [];
  for (const [noradId, meta] of chineseMeta) {
    const tle = byNorad.get(noradId);
    chineseAll.push({
      norad: noradId,
      intlDes: meta.intlDes,
      name: meta.name,
      purpose: meta.purpose,
      category: meta.category,
      launch: meta.launch,
      apogee: meta.apogee,
      perigee: meta.perigee,
      avgAlt: meta.avgAlt,
      rcs: meta.rcs,
      ops: meta.ops,
      tle1: tle ? tle.tle1 : null,
      tle2: tle ? tle.tle2 : null,
      hasTle: !!tle,
    });
  }
  catCountEl.textContent = chineseAll.length.toLocaleString();
  catStatusEl.textContent = `${chineseAll.length} payloads · pick a category`;
  if (groupSelect.value) populateCatList(groupSelect.value);
}

function populateCatList(category) {
  if (!category) {
    catListEl.innerHTML = '<option>Select a category above</option>';
    catStatusEl.textContent = `${chineseAll.length} payloads · pick a category`;
    return;
  }
  const inGroup = chineseAll.filter(s => s.category === category);
  inGroup.sort((a, b) => a.name.localeCompare(b.name));
  if (inGroup.length === 0) {
    catListEl.innerHTML = '<option>No payloads in this group</option>';
    catStatusEl.textContent = `0 in ${category}`;
    return;
  }
  catListEl.innerHTML = inGroup.map(s =>
    `<option value="${s.norad}">${escapeHtml(s.name)}</option>`
  ).join('');
  catStatusEl.textContent = `${inGroup.length} in ${category} · click any to inspect`;
}

groupSelect.addEventListener('change', e => populateCatList(e.target.value));

function openModal(norad) {
  const s = chineseAll.find(x => x.norad === norad);
  if (!s) return;
  modalTitle.textContent = s.name;
  const apoPer = (s.apogee != null && s.perigee != null)
    ? `${Math.round(s.apogee).toLocaleString()} × ${Math.round(s.perigee).toLocaleString()} km`
    : 'Unknown';
  const ops = ({
    '+': 'Operational', '-': 'Non-operational', 'P': 'Partially operational',
    'B': 'Backup/standby', 'S': 'Spare', 'X': 'Extended mission', 'D': 'Decayed',
    'R': 'Reentered', 'U': 'Unknown', '': 'Unknown'
  })[s.ops] || s.ops;
  const tleBlock = s.hasTle
    ? `<pre class="tle">${escapeHtml(s.tle1)}\n${escapeHtml(s.tle2)}</pre>`
    : `<pre class="tle">No active TLE — satellite may have decayed or be inactive.</pre>`;
  modalBody.innerHTML = `
    <div class="kv"><span class="k">Stated purpose</span><span class="v">${escapeHtml(s.purpose)}</span></div>
    <div class="kv"><span class="k">Category</span><span class="v">${escapeHtml(s.category)}</span></div>
    <div class="kv"><span class="k">NORAD ID</span><span class="v">${s.norad}</span></div>
    <div class="kv"><span class="k">Int'l Designator</span><span class="v">${escapeHtml(s.intlDes || '—')}</span></div>
    <div class="kv"><span class="k">Launch date</span><span class="v">${escapeHtml(s.launch || 'Unknown')}</span></div>
    <div class="kv"><span class="k">Status</span><span class="v">${escapeHtml(ops)}</span></div>
    <div class="kv"><span class="k">Apogee × Perigee</span><span class="v">${apoPer}</span></div>
    <div class="kv"><span class="k">Dimensions</span><span class="v">${escapeHtml(dimensionsOf(s.name, s.rcs))}</span></div>
    <div class="kv-block">
      <div class="k">TLE (latest from CelesTrak)</div>
      ${tleBlock}
    </div>
  `;
  modalEl.classList.remove('hidden');
}

function closeModal() { modalEl.classList.add('hidden'); }

catListEl.addEventListener('click', e => {
  const opt = e.target.closest('option');
  if (opt && opt.value) openModal(opt.value);
});
catListEl.addEventListener('change', e => {
  if (e.target.value) openModal(e.target.value);
});
modalCloseEl.addEventListener('click', closeModal);
modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
